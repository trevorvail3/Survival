# Publishes Ashfall to GitHub Pages so there's a live URL to play.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
# Then every push to this branch (or main) redeploys; the URL is shown in the
# Actions run summary (typically https://<user>.github.io/<repo>/).
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "claude/new-survival-game-setup-0d27xa"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
